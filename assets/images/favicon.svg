<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097a7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle with gradient -->
  <circle cx="60" cy="60" r="55" fill="url(#bg)"/>
  
  <!-- Inner circle border -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#0a2e5c" stroke-width="2" opacity="0.3"/>
  
  <!-- Letter A - centered -->
  <text x="60" y="78" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-size="52" font-weight="800" fill="#0a2e5c" text-anchor="middle" dominant-baseline="middle">A</text>
  
  <!-- Letter H - slightly to the right -->
  <text x="72" y="78" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-size="52" font-weight="800" fill="#0a2e5c" text-anchor="middle" dominant-baseline="middle">H</text>
</svg>